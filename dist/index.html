<!DOCTYPE html><html lang="es"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Simulador de Conducción 3D</title><style>:root{--bg-color: #0f172a;--text-color: #f8fafc;--primary-color: #3b82f6;--primary-hover: #2563eb;--danger-color: #ef4444}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,-apple-system,sans-serif;background-color:var(--bg-color);color:var(--text-color);overflow:hidden;touch-action:none}#canvas-container{position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:1}#ui-layer{position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}.top-bar{display:flex;justify-content:center;align-items:flex-start;padding:20px;position:relative}.score-panel{background:#0f172acc;backdrop-filter:blur(8px);padding:12px 24px;border-radius:12px;border:1px solid rgba(255,255,255,.1);font-size:1.5rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;box-shadow:0 4px 6px -1px #0000001a,0 2px 4px -1px #0000000f}.score-value{color:#10b981}.warning-container{position:absolute;top:80px;left:50%;transform:translate(-50%);display:flex;flex-direction:column;gap:10px}.warning{background:var(--danger-color);color:#fff;padding:10px 20px;border-radius:8px;font-weight:700;font-size:1.2rem;opacity:0;transform:translateY(-20px);transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 10px 15px -3px #ef444480;pointer-events:none}.warning.active{opacity:1;transform:translateY(0)}.touch-controls{padding:20px;pointer-events:auto;display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}.d-pad,.action-pad{display:flex;gap:10px}.d-pad{flex-direction:column;align-items:center}.d-pad-row{display:flex;gap:10px}.control-btn{width:60px;height:60px;background:#ffffff1a;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);border-radius:50%
